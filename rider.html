<!DOCTYPE html>
<html>
<head>
  <title>Rider App — Magizham</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --green: #2d6a4f;
      --gold:  #d4a017;
      --dark:  #111827;
      --card:  #1f2937;
      --text:  #f9fafb;
      --gray:  #9ca3af;
      --red:   #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Nunito", sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      padding: 20px 16px 40px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .header-logo { font-size: 36px; }

    .header-text h1 {
      font-size: 20px;
      font-weight: 800;
    }

    .header-text p {
      font-size: 12px;
      color: var(--gray);
    }

    .live-indicator {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 700;
    }

    .live-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #6b7280;
    }

    .live-dot.active {
      background: #22c55e;
      box-shadow: 0 0 0 4px rgba(34,197,94,0.25);
      animation: blink 1.2s infinite;
    }

    @keyframes blink {
      0%,100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .card {
      background: var(--card);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 14px;
    }

    .card-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    .order-input-row {
      display: flex;
      gap: 10px;
    }

    .order-input-row input {
      flex: 1;
      background: #374151;
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      color: white;
      font-size: 15px;
      font-weight: 700;
      outline: none;
    }

    .load-btn {
      background: var(--green);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    #orderInfo { display: none; }

    .order-detail-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 5px 0;
      border-bottom: 1px solid #374151;
    }

    .status-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .status-btn {
      padding: 11px 10px;
      border: 2px solid #374151;
      border-radius: 12px;
      background: transparent;
      color: var(--gray);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .status-btn.current {
      border-color: var(--green);
      background: var(--green);
      color: white;
    }

    #gpsBtn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      background: linear-gradient(135deg, #2d6a4f, #1a3d2d);
      color: white;
      margin-bottom: 14px;
    }

    #gpsBtn.stop {
      background: linear-gradient(135deg, #dc2626, #7f1d1d);
    }

    .coords-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .coord-card {
      background: #374151;
      border-radius: 10px;
      padding: 10px 12px;
    }

    .coord-card .c-value {
      font-size: 13px;
      font-weight: 800;
      color: #34d399;
    }

    .log {
      max-height: 120px;
      overflow-y: auto;
      font-size: 11px;
    }

    .log-line { padding: 3px 0; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-logo">🏍</div>
  <div class="header-text">
    <h1>Rider App</h1>
    <p>Magizham Food Stuff</p>
  </div>
  <div class="live-indicator">
    <div class="live-dot" id="liveDot"></div>
    <span id="liveText">Offline</span>
  </div>
</div>

<div class="card">
  <div class="card-title">📦 Your Order</div>
  <div class="order-input-row">
    <input type="number" id="orderIdInput" placeholder="Enter Order ID">
    <button class="load-btn" onclick="loadOrder()">Load</button>
  </div>
  <div id="orderInfo" style="margin-top:12px">
    <div class="order-detail-row">
      <span>Order ID</span>
      <span id="oi-id">--</span>
    </div>
  </div>
</div>

<button id="gpsBtn" onclick="toggleGPS()">▶ Start Sharing GPS</button>

<div class="card">
  <div class="card-title">📍 Current Location</div>
  <div class="coords-grid">
    <div class="coord-card"><div id="lat">--</div></div>
    <div class="coord-card"><div id="lng">--</div></div>
  </div>
</div>

<div class="card">
  <div class="card-title">🔧 Activity Log</div>
  <div class="log" id="log"></div>
</div>

<!-- ✅ Scripts -->
<script src="/socket.io/socket.io.js"></script>
<script src="/i18n.js"></script>

<script>
let socket=null,isTracking=false,watchId=null,currentOrderId=null;

function log(msg){
  const el=document.getElementById("log");
  const d=document.createElement("div");
  d.textContent=msg;
  el.prepend(d);
}

function toggleGPS(){
  isTracking?stopGPS():startGPS();
}

function startGPS(){
  if(!navigator.geolocation){log("No GPS");return;}
  isTracking=true;
  document.getElementById("gpsBtn").innerText="Stop GPS";

  watchId=navigator.geolocation.watchPosition(pos=>{
    const lat=pos.coords.latitude;
    const lng=pos.coords.longitude;

    document.getElementById("lat").innerText=lat.toFixed(6);
    document.getElementById("lng").innerText=lng.toFixed(6);

    if(socket?.connected){
      socket.emit("riderLocationUpdate",{lat,lng});
    }
  });
}

function stopGPS(){
  isTracking=false;
  navigator.geolocation.clearWatch(watchId);
  document.getElementById("gpsBtn").innerText="Start GPS";
}
</script>

</body>
</html>
